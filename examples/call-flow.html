<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code 调用流程图</title>

<!-- Mermaid -->
<script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>

<!-- markdown-it -->
<script src="https://cdn.jsdelivr.net/npm/markdown-it@14/dist/markdown-it.min.js"></script>

<!-- highlight.js -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github.min.css" id="hljs-light-theme">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/styles/github-dark.min.css" id="hljs-dark-theme" disabled>
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11/build/highlight.min.js"></script>

<style>

:root {
  --bg: #ffffff;
  --text: #1a1a1a;
  --heading: #111111;
  --link: #0366d6;
  --code-bg: #f6f8fa;
  --border: #e1e4e8;
  --toc-bg: #f8f9fa;
  --quote-border: #dfe2e5;
  --table-border: #c6c8cb;
  --overlay-bg: rgba(255,255,255,0.97);
  --muted: #6a737d;
  --success: #28a745;
}

[data-theme="dark"] {
  --bg: #0d1117;
  --text: #c9d1d9;
  --heading: #f0f6fc;
  --link: #58a6ff;
  --code-bg: #161b22;
  --border: #30363d;
  --toc-bg: #161b22;
  --quote-border: #3b434b;
  --table-border: #3b434b;
  --overlay-bg: rgba(13,17,23,0.97);
  --muted: #8b949e;
  --success: #3fb950;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
  font-size: 16px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  height: 100vh;
  overflow: hidden;
}

.topbar {
  position: sticky;
  top: 0;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
  height: 44px;
}

.topbar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}

.topbar-title {
  font-weight: 600;
  font-size: 14px;
  color: var(--muted);
  max-width: 200px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.save-status {
  font-size: 11px;
  color: var(--muted);
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--code-bg);
  white-space: nowrap;
}

.save-status.connected {
  color: var(--success);
  background: rgba(40, 167, 69, 0.1);
  font-weight: 500;
}

.topbar-actions {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: nowrap;
}

.mode-group {
  display: flex;
  border: 1px solid var(--border);
  border-radius: 6px;
  overflow: hidden;
}

.mode-btn {
  background: none;
  border: none;
  border-right: 1px solid var(--border);
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.15s;
  white-space: nowrap;
}

.mode-btn:last-child { border-right: none; }
.mode-btn.active-mode { background: var(--link); color: #fff; }
.mode-btn:hover:not(.active-mode) { background: var(--code-bg); }

.topbar-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 10px;
  font-size: 12px;
  cursor: pointer;
  color: var(--text);
  transition: background 0.15s;
  white-space: nowrap;
}
.topbar-btn:hover { background: var(--code-bg); }
.topbar-btn.save-ready { border-color: var(--success); color: var(--success); }

.toc-sidebar {
  position: fixed;
  left: 0;
  top: 44px;
  width: 260px;
  height: calc(100vh - 44px);
  background: var(--toc-bg);
  border-right: 1px solid var(--border);
  padding: 20px 16px;
  overflow-y: auto;
  font-size: 13px;
  display: none;
  z-index: 90;
}
.toc-sidebar.open { display: block; }

.toc-link {
  display: block;
  padding: 3px 0;
  color: var(--muted);
  text-decoration: none;
  transition: color 0.15s;
  line-height: 1.4;
}
.toc-link:hover { color: var(--link); }
.toc-h2 { padding-left: 0; font-weight: 500; }
.toc-h3 { padding-left: 16px; }
.toc-h4 { padding-left: 32px; }

.main-content {
  height: calc(100vh - 44px);
  transition: margin-left 0.2s;
}
.main-content.with-toc { margin-left: 260px; }

.split-container {
  display: flex;
  height: 100%;
  overflow: hidden;
}

.editor-pane {
  width: 50%;
  display: flex;
  flex-direction: column;
  border-right: 2px solid var(--border);
  overflow: hidden;
  transition: width 0.15s;
}

.preview-pane {
  width: 50%;
  overflow-y: auto;
  padding: 40px 24px;
  transition: width 0.15s;
}

.editor-pane textarea {
  width: 100%;
  height: 100%;
  resize: none;
  border: none;
  padding: 20px;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
  background: var(--bg);
  outline: none;
  tab-size: 4;
  white-space: pre-wrap;
  word-wrap: break-word;
  overflow-y: auto;
}

.md-body h1, .md-body h2, .md-body h3, .md-body h4, .md-body h5, .md-body h6 {
  color: var(--heading);
  margin-top: 24px;
  margin-bottom: 16px;
  font-weight: 600;
  line-height: 1.25;
}
.md-body h1 { font-size: 2em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.md-body h2 { font-size: 1.5em; border-bottom: 1px solid var(--border); padding-bottom: 0.3em; }
.md-body h3 { font-size: 1.25em; }
.md-body h4 { font-size: 1em; }
.md-body p { margin-bottom: 16px; }
.md-body a { color: var(--link); text-decoration: none; }
.md-body a:hover { text-decoration: underline; }
.md-body strong { font-weight: 600; }

.md-body ul, .md-body ol {
  margin-bottom: 16px;
  padding-left: 2em;
}
.md-body li { margin-bottom: 4px; }
.md-body li.task-list-item { list-style: none; margin-left: -1.5em; }

.md-body blockquote {
  padding: 0 1em;
  margin-bottom: 16px;
  color: var(--muted);
  border-left: 4px solid var(--quote-border);
}

.md-body code {
  padding: 0.2em 0.4em;
  margin: 0;
  font-size: 85%;
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  background: var(--code-bg);
  border-radius: 3px;
}

.md-body pre {
  padding: 16px;
  overflow: auto;
  font-size: 85%;
  line-height: 1.45;
  background: var(--code-bg);
  border-radius: 6px;
  margin-bottom: 16px;
  position: relative;
}
.md-body pre code {
  padding: 0;
  margin: 0;
  font-size: 100%;
  background: none;
  border-radius: 0;
}

.copy-btn {
  position: absolute;
  top: 8px;
  right: 8px;
  background: none;
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
  font-size: 12px;
  cursor: pointer;
  color: var(--muted);
  opacity: 0;
  transition: opacity 0.2s;
}
.md-body pre:hover .copy-btn { opacity: 1; }
.copy-btn:hover { background: var(--border); }

.md-body table {
  border-collapse: collapse;
  margin-bottom: 16px;
  width: 100%;
}
.md-body table th, .md-body table td {
  padding: 6px 13px;
  border: 1px solid var(--table-border);
}
.md-body table th { font-weight: 600; background: var(--toc-bg); }
.md-body table tr:nth-child(even) { background: var(--toc-bg); }

.md-body img { max-width: 100%; border-radius: 4px; }
.md-body hr { height: 2px; padding: 0; margin: 24px 0; background: var(--border); border: 0; }

.mermaid-wrapper {
  text-align: center;
  margin: 16px 0;
  cursor: pointer;
  position: relative;
}
.mermaid-wrapper .zoom-hint {
  position: absolute;
  top: 4px;
  right: 4px;
  font-size: 11px;
  color: var(--muted);
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 3px;
  opacity: 0;
  transition: opacity 0.2s;
}
.mermaid-wrapper:hover .zoom-hint { opacity: 1; }
.mermaid-wrapper svg { max-width: 100%; }

.mermaid-error {
  color: #d73a49;
  font-family: monospace;
  font-size: 13px;
  padding: 8px 12px;
  background: var(--code-bg);
  border-radius: 4px;
  border: 1px solid var(--border);
  white-space: pre-wrap;
}

.svg-overlay {
  display: none;
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: var(--overlay-bg);
  z-index: 200;
  cursor: grab;
  overflow: hidden;
}
.svg-overlay.active { display: flex; align-items: center; justify-content: center; }

.svg-overlay .overlay-close {
  position: absolute;
  top: 16px; right: 16px;
  background: none;
  border: none;
  font-size: 24px;
  cursor: pointer;
  color: var(--text);
  opacity: 0.5;
  z-index: 210;
}
.svg-overlay .overlay-close:hover { opacity: 1; }

.svg-overlay .overlay-controls {
  position: absolute;
  bottom: 16px; right: 16px;
  display: flex; gap: 8px;
  z-index: 210;
}
.svg-overlay .overlay-btn {
  background: var(--toc-bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 6px 12px;
  font-size: 13px;
  cursor: pointer;
  color: var(--text);
}
.svg-overlay .overlay-btn:hover { background: var(--border); }

.svg-overlay .svg-container {
  transform-origin: center center;
  transition: none;
  max-width: 90vw;
  max-height: 90vh;
}

.svg-overlay .zoom-level {
  position: absolute;
  bottom: 16px; left: 16px;
  font-size: 12px;
  color: var(--muted);
  z-index: 210;
}

@media print {
  .topbar, .toc-sidebar, .copy-btn, .zoom-hint, .svg-overlay,
  .editor-pane, .mode-group, .save-status { display: none !important; }
  .preview-pane { width: 100% !important; padding: 0 !important; }
  .main-content { margin-left: 0 !important; height: auto !important; }
  body { height: auto; overflow: visible; }
  .split-container { display: block !important; }
}

@media (max-width: 768px) {
  .toc-sidebar { width: 200px; }
  .main-content.with-toc { margin-left: 0; }
  .topbar-actions { flex-wrap: wrap; gap: 4px; }
  .topbar-left { max-width: 120px; }
  .split-container { flex-direction: column; }
  .editor-pane { width: 100% !important; height: 50%; border-right: none; border-bottom: 2px solid var(--border); }
  .preview-pane { width: 100% !important; height: 50%; }
}

</style>
</head>
<body data-theme="light">

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-left">
    <span class="topbar-title">Claude Code 调用流程图</span>
    <span class="save-status" id="save-status">Checking server...</span>
  </div>
  <div class="topbar-actions">
    <div class="mode-group">
      <button class="mode-btn active-mode" data-mode="split">Split</button>
      <button class="mode-btn" data-mode="view">View</button>
      <button class="mode-btn" data-mode="edit">Edit</button>
    </div>
    <button class="topbar-btn" id="save-btn">Save</button>
    <button class="topbar-btn" id="download-btn">Download</button>
    <button class="topbar-btn" id="toc-toggle">TOC</button>
    <button class="topbar-btn" id="theme-toggle">Dark</button>
  </div>
</div>

<!-- TOC sidebar -->
<div class="toc-sidebar" id="toc-sidebar"></div>

<!-- Main content -->
<div class="main-content" id="main-content">
  <div class="split-container" id="split-container">
    <div class="editor-pane" id="editor-pane">
      <textarea id="editor" spellcheck="false"></textarea>
    </div>
    <div class="preview-pane" id="preview-pane">
      <div class="md-body" id="preview-body"></div>
    </div>
  </div>
</div>

<!-- SVG Zoom overlay -->
<div class="svg-overlay" id="svg-overlay">
  <button class="overlay-close" id="overlay-close">&times;</button>
  <div class="svg-container" id="svg-container"></div>
  <div class="zoom-level" id="zoom-level">100%</div>
  <div class="overlay-controls">
    <button class="overlay-btn" id="zoom-in">Zoom In</button>
    <button class="overlay-btn" id="zoom-out">Zoom Out</button>
    <button class="overlay-btn" id="zoom-reset">Reset</button>
  </div>
</div>

<script>

(function() {
  var rawMarkdown = "# Claude Code 调用流程图\n示例图如下所示\n\nchange 14:50\n\n## 启动流程\n\n```mermaid\nsequenceDiagram\n    participant User as 用户终端\n    participant CLI as cli.tsx\n    participant MAIN as main.tsx\n    participant INIT as init.ts\n    participant BOOT as bootstrap/state.ts\n    participant CMD as Commander.js\n    participant SETUP as setup.ts\n    participant LAUNCH as replLauncher.tsx\n    participant APP as App.tsx\n    participant REPL as REPL.tsx\n\n    User->>CLI: 执行 bun run dev\n\n    CLI->>CLI: 解析 process.argv\n    CLI->>CLI: 注入 MACRO 全局变量\n    CLI->>CLI: 注入 feature() polyfill (always false)\n    CLI->>CLI: 设置 BUILD_TARGET/BUILD_ENV/INTERFACE_TYPE\n\n    alt 快速路径 (--version, --dump-system-prompt 等)\n        CLI->>CLI: 直接处理并退出\n    else 正常CLI执行\n        CLI->>MAIN: import(\"../main.jsx\") → main()\n\n        MAIN->>MAIN: 模块级副作用\n        Note over MAIN: profileCheckpoint('main_tsx_entry')\n        Note over MAIN: startMdmRawRead()\n        Note over MAIN: startKeychainPrefetch()\n\n        MAIN->>CMD: 创建 Commander program\n\n        CMD->>INIT: preAction hook → await init()\n        INIT->>BOOT: 初始化全局状态\n        Note over INIT: enableConfigs()\n        Note over INIT: applySafeConfigEnvironmentVariables()\n        Note over INIT: applyExtraCACertsFromConfig()\n        Note over INIT: setupGracefulShutdown()\n        Note over INIT: initialize1PEventLogging()\n        Note over INIT: populateOAuthAccountInfoIfNeeded()\n        Note over INIT: initJetBrainsDetection()\n        Note over INIT: detectCurrentRepository()\n        Note over INIT: initializeRemoteManagedSettingsLoadingPromise()\n        Note over INIT: initializePolicyLimitsLoadingPromise()\n        Note over INIT: configureGlobalMTLS()\n        Note over INIT: configureGlobalAgents()\n        Note over INIT: preconnectAnthropicApi()\n\n        CMD->>SETUP: action handler → setup()\n        SETUP->>LAUNCH: launchRepl(root, appProps, replProps)\n\n        LAUNCH->>APP: import('./components/App.js')\n        LAUNCH->>REPL: import('./screens/REPL.js')\n        LAUNCH->>APP: renderAndRun(<App><REPL/></App>)\n\n        APP->>APP: FpsMetricsProvider → StatsProvider → AppStateProvider\n        REPL->>REPL: 初始化REPL组件\n        REPL->>User: 显示交互式终端UI\n    end\n```\n\n## 用户消息查询流程\n\n```mermaid\nsequenceDiagram\n    participant User as 用户\n    participant PROMPT as PromptInput\n    participant QE as QueryEngine\n    participant PROCESS as processUserInput\n    participant QL as queryLoop\n    participant COMPACT as 压缩服务\n    participant API as services/api/claude.ts\n    participant SDK as Anthropic SDK\n    participant TOOL as 工具系统\n    participant STATE as AppState\n\n    User->>PROMPT: 输入消息\n    PROMPT->>QE: submitMessage(prompt, options)\n\n    QE->>PROCESS: processUserInput()\n    Note over PROCESS: 解析斜杠命令\n    Note over PROCESS: 处理附件\n    Note over PROCESS: 确定模型\n\n    QE->>QE: 构建系统提示词\n    Note over QE: customPrompt + memoryMechanicsPrompt + appendSystemPrompt\n\n    QE->>QE: 加载技能和插件\n    Note over QE: getSlashCommandToolSkills()\n    Note over QE: loadAllPluginsCacheOnly()\n\n    QE->>QL: query(config)\n\n    QL->>COMPACT: 压缩检查\n    Note over COMPACT: snipCompactIfNeeded()\n    Note over COMPACT: microcompactMessages()\n    Note over COMPACT: contextCollapse.applyCollapsesIfNeeded()\n    Note over COMPACT: autoCompactIfNeeded()\n\n    QL->>API: deps.callModel() = queryModelWithStreaming()\n\n    API->>API: 构建请求参数\n    Note over API: normalizeMessagesForAPI()\n    Note over API: buildSystemPromptBlocks()\n    Note over API: toolToAPISchema()\n    Note over API: 配置beta headers (thinking, caching)\n\n    API->>SDK: anthropic.beta.messages.create({stream: true})\n\n    loop 流式响应事件\n        SDK->>API: message_start\n        SDK->>API: content_block_start\n        SDK->>API: content_block_delta (文本/工具调用)\n        SDK->>API: content_block_stop\n        SDK->>API: message_delta (usage/cost)\n        SDK->>API: message_stop\n        API->>QL: yield 事件消息\n        QL->>STATE: 更新UI状态\n        STATE->>User: 渲染消息\n    end\n\n    alt 包含工具调用\n        QL->>QL: 提取 tool_use blocks\n        QL->>TOOL: runTools(toolUseBlocks, ...)\n        loop 每个工具\n            TOOL->>TOOL: 查找工具定义\n            TOOL->>TOOL: 验证输入 schema\n            TOOL->>TOOL: 检查权限 canUseTool()\n            TOOL->>TOOL: tool.call(input, context)\n            TOOL->>QL: 返回 ToolResult\n            QL->>STATE: 更新UI\n            STATE->>User: 显示工具结果\n        end\n        QL->>QL: 递归下一轮\n    else 无工具调用(纯文本)\n        QL->>QE: 返回最终结果\n        QE->>STATE: 更新消息列表\n        STATE->>User: 显示完整回复\n    end\n```\n\n## 工具执行详细流程\n\n```mermaid\nsequenceDiagram\n    participant QL as queryLoop\n    participant STE as StreamingToolExecutor\n    participant FIND as findToolByName\n    participant TOOL as Tool.call()\n    participant PERM as canUseTool\n    participant PERM_UI as PermissionRequest UI\n    participant USER as 用户\n    participant EXEC as 工具执行逻辑\n    participant RESULT as ToolResult\n\n    QL->>STE: 添加工具调用到队列\n    STE->>STE: addTool(toolUseBlock)\n\n    STE->>FIND: findToolByName(tools, toolName)\n    FIND->>FIND: 在内置工具和MCP工具中查找\n\n    STE->>PERM: canUseTool(tool, input)\n    alt 权限自动允许\n        PERM->>STE: 允许\n    else 需要用户审批\n        PERM->>PERM_UI: 显示权限请求\n        PERM_UI->>USER: 请求确认\n        USER->>PERM_UI: 允许/拒绝\n        alt 用户允许\n            PERM_UI->>PERM: 允许\n        else 用户拒绝\n            PERM_UI->->>STE: 拒绝 → 返回拒绝消息\n        end\n    end\n\n    STE->>TOOL: tool.inputSchema.safeParse(input)\n    alt 验证成功\n        STE->->>EXEC: tool.call(input, context, canUseTool, message, onProgress)\n        loop 进度更新\n            EXEC->>STE: onProgress(progressMessage)\n            STE->>USER: 显示进度\n        end\n        EXEC->>RESULT: 返回 {data, newMessages, contextModifier}\n        RESULT->>STE: 处理结果\n        alt 结果超过 maxResultSizeChars\n            STE->>STE: toolResultStorage.persistToDisk()\n        else 结果在内存中\n            STE->>STE: 直接存储结果\n        end\n    else 验证失败\n        STE->->>QL: 返回验证错误消息\n    end\n\n    STE->>QL: 所有工具结果完成\n\n    QL->>QL: 构建工具结果消息\n    QL->>QL: 递归进入下一轮对话\n```\n\n## API请求构建与流式响应处理流程\n\n```mermaid\nsequenceDiagram\n    participant QL as queryLoop\n    participant API as claude.ts\n    participant BUILD as 请求构建\n    participant CLIENT as getAnthropicClient\n    participant PROV as Provider选择\n    participant SDK as Anthropic SDK\n    participant STREAM as SSE流\n    participant PROCESS as 事件处理\n\n    QL->>API: queryModelWithStreaming(messages, config)\n\n    API->>API: withStreamingVCR(messages, queryModel)\n\n    API->>BUILD: queryModel() - 构建请求\n    Note over BUILD: 1. 获取 previousRequestId\n    Note over BUILD: 2. resolveModel() - Bedrock inference profiles\n    Note over BUILD: 3. buildToolSchema() - defer_loading\n    Note over BUILD: 4. normalizeMessagesForAPI()\n    Note over BUILD: 5. buildSystemPromptBlocks()\n    Note over BUILD: 6. 配置beta headers (thinking, caching)\n    Note over BUILD: 7. 配置effort params\n    Note over BUILD: 8. 配置task budget\n\n    API->>CLIENT: getAnthropicClient(config)\n    CLIENT->>PROV: getAPIProvider()\n    Note over PROV: 检测环境变量选择Provider:\n    Note over PROV: CLAUDE_CODE_USE_BEDROCK → bedrock\n    Note over PROV: CLAUDE_CODE_USE_VERTEX → vertex\n    Note over PROV: CLAUDE_CODE_USE_FOUNDRY → foundry\n    Note over PROV: 默认 → firstParty (api.anthropic.com)\n\n    CLIENT->>CLIENT: 配置认证 (OAuth/API key)\n    CLIENT->>CLIENT: 配置请求头 (x-app, User-Agent)\n    CLIENT->>CLIENT: 配置代理/mTLS\n\n    CLIENT->>SDK: 创建 Anthropic SDK client\n\n    API->>API: withRetry(() => ...)\n    API->>SDK: anthropic.beta.messages.create({params, stream:true})\n\n    SDK->>STREAM: SSE流开始\n\n    loop 流式事件处理\n        STREAM->>PROCESS: message_start事件\n        Note over PROCESS: 初始化消息追踪, 获取usage\n\n        STREAM->>PROCESS: content_block_start事件\n        Note over PROCESS: 记录block类型(text/tool_use/thinking)\n\n        STREAM->>PROCESS: content_block_delta事件\n        Note over PROCESS: text: 累积文本内容\n        Note over PROCESS: input_json_delta: 累积工具输入\n        Note over PROCESS: thinking_delta: 累积思考内容\n\n        STREAM->>PROCESS: content_block_stop事件\n        Note over PROCESS: 完成content block解析\n\n        STREAM->>PROCESS: message_delta事件\n        Note over PROCESS: 更新usage统计和费用\n\n        STREAM->>PROCESS: message_stop事件\n        Note over PROCESS: 完成消息, 记录最终usage\n\n        PROCESS->>QL: yield 消息更新\n    end\n\n    PROCESS->>QL: 流式响应完成\n```\n\n## 上下文压缩流程\n\n```mermaid\nflowchart TD\n    START[\"queryLoop 开始\"] --> CHECK_LEN{\"消息长度检查\"}\n\n    CHECK_LEN -->|\"超过阈值\"| SNIP[\"snipCompactIfNeeded()<br/>基于规则的裁剪\"]\n    SNIP --> MICRO\n\n    CHECK_LEN -->|\"未超过\"| MICRO{\"微压缩检查\"}\n\n    MICRO -->|\"需要\"| MICRO_COMP[\"microcompactMessages()<br/>移除冗余细节\"]\n    MICRO_COMP --> COLLAPSE\n\n    MICRO -->|\"不需要\"| COLLAPSE{\"上下文折叠检查<br/>feature(CONTEXT_COLLAPSE)\"}\n\n    COLLAPSE -->|\"启用\"| COLLAPSE_APPLY[\"contextCollapse.applyCollapsesIfNeeded()<br/>折叠重复/过期内容\"]\n    COLLAPSE_APPLY --> AUTO\n\n    COLLAPSE -->|\"禁用\"| AUTO{\"自动压缩检查\"}\n\n    AUTO -->|\"需要\"| AUTO_COMP[\"autoCompactIfNeeded()<br/>智能摘要压缩<br/>保留关键信息\"]\n    AUTO_COMP --> CALL_MODEL\n\n    AUTO -->|\"不需要\"| CALL_MODEL[\"调用API模型\"]\n\n    CALL_MODEL --> RESULT[\"处理响应\"]\n    RESULT --> LOOP_BACK{\"有工具调用?\"}\n\n    LOOP_BACK -->|\"有\"| TOOL_EXEC[\"工具执行\"]\n    TOOL_EXEC --> CHECK_LEN\n\n    LOOP_BACK -->|\"无\"| END[\"对话完成\"]\n```\n\n## 命令处理流程\n\n```mermaid\nsequenceDiagram\n    participant User as 用户\n    participant REPL as REPL.tsx\n    participant PROCESS as processUserInput\n    participant CMD as 命令系统\n    participant QE as QueryEngine\n\n    User->>REPL: 输入 /commit 或其他斜杠命令\n\n    REPL->>PROCESS: processUserInput()\n\n    PROCESS->>PROCESS: 检测斜杠命令前缀 /\n\n    alt 命令存在\n        PROCESS->>CMD: 执行命令\n        Note over CMD: 命令在 src/commands/ 中定义\n\n        alt 命令返回工具调用\n            CMD->>QE: 作为工具结果插入对话\n            QE->>User: 继续对话循环\n        else 命令直接输出\n            CMD->>User: 显示命令输出\n        end\n    else 命令不存在\n        PROCESS->->>QE: 作为普通消息发送\n    end\n```\n\n## 从用户输入到最终输出的完整流程\n\n```mermaid\nflowchart TD\n    subgraph 用户交互\n        A1[\"用户在终端输入消息\"] --> A2[\"PromptInput 接收输入\"]\n        A2 --> A3{\"是否斜杠命令?\"}\n        A3 -->|\"是\"| A4[\"processUserInput 解析命令\"]\n        A3 -->|\"否\"| A5[\"构建 UserMessage\"]\n    end\n\n    subgraph 消息处理\n        A4 --> B1[\"命令执行/转换\"]\n        A5 --> B1\n        B1 --> B2[\"附加附件信息\"]\n        B2 --> B3[\"添加到 mutableMessages\"]\n    end\n\n    subgraph 查询准备\n        B3 --> C1[\"构建系统提示词<br/>getSystemContext + getUserContext\"]\n        C1 --> C2[\"加载工具池<br/>assembleToolPool\"]\n        C2 --> C3[\"加载技能和插件\"]\n        C3 --> C4[\"应用压缩策略<br/>snip/micro/auto\"]\n        C4 --> C5[\"构建API请求参数<br/>normalizeMessages + buildSystemPromptBlocks\"]\n    end\n\n    subgraph API调用与响应\n        C5 --> D1[\"queryModelWithStreaming<br/>发送到 Anthropic API\"]\n        D1 --> D2[\"处理流式响应<br/>text/tool_use/thinking blocks\"]\n        D2 --> D3{\"包含工具调用?\"}\n    end\n\n    subgraph 工具执行循环\n        D3 -->|\"是\"| E1[\"StreamingToolExecutor<br/>管理并发工具执行\"]\n        E1 --> E2[\"权限检查 canUseTool\"]\n        E2 --> E3{\"需要用户审批?\"}\n        E3 -->|\"是\"| E4[\"PermissionRequest UI\"]\n        E4 --> E5{\"用户允许?\"}\n        E5 -->|\"是\"| E6[\"tool.call() 执行\"]\n        E5 -->|\"否\"| E7[\"返回拒绝消息\"]\n        E3 -->|\"否\"| E6\n        E6 --> E8[\"ToolResult 处理\"]\n        E7 --> E8\n        E8 --> E9[\"构建工具结果消息\"]\n        E9 --> E10[\"添加到 mutableMessages\"]\n        E10 --> C4\n    end\n\n    subgraph 结果渲染\n        D3 -->|\"否\"| F1[\"最终文本回复\"]\n        E8 -->|\"所有工具完成\"| F2[\"递归结果\"]\n        F1 --> F3[\"更新 AppState\"]\n        F2 --> F3\n        F3 --> F4[\"Messages 组件渲染\"]\n        F4 --> F5[\"VirtualMessageList<br/>虚拟滚动列表\"]\n        F5 --> F6[\"MessageRow 渲染<br/>各种block类型\"]\n        F6 --> F7[\"终端输出显示\"]\n    end\n```";
  var sourceFileName = "call-flow.md";
  var sourceRelPath = "call-flow.md";
  var savePort = 3800;

  var currentTheme = 'light';
  var currentMode = 'split';
  var serverConnected = false;
  var syncScrollLock = null;
  var mdi = null;
  var mermaidReady = false;
  var mermaidTheme = 'default';

  var editor = document.getElementById('editor');
  var previewBody = document.getElementById('preview-body');
  var previewPane = document.getElementById('preview-pane');
  var editorPane = document.getElementById('editor-pane');

  editor.value = rawMarkdown;

  // Check server connection on load
  checkServerConnection();

  function checkServerConnection() {
    fetch('http://localhost:' + savePort + '/ping')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          serverConnected = true;
          var statusEl = document.getElementById('save-status');
          statusEl.textContent = 'Sync ready';
          statusEl.className = 'save-status connected';
          var saveBtn = document.getElementById('save-btn');
          saveBtn.classList.add('save-ready');
        }
      })
      .catch(function() {
        var statusEl = document.getElementById('save-status');
        statusEl.textContent = 'Server offline - use Download';
      });
  }

  // Tab key inserts tab character
  editor.addEventListener('keydown', function(e) {
    if (e.key === 'Tab') {
      e.preventDefault();
      var start = editor.selectionStart;
      var end = editor.selectionEnd;
      editor.value = editor.value.substring(0, start) + '\t' + editor.value.substring(end);
      editor.selectionStart = editor.selectionEnd = start + 1;
      if (mdi) triggerRender();
    }
  });

  // Ctrl+S save shortcut
  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      saveToFile();
    }
  });

  // Theme toggle
  var themeBtn = document.getElementById('theme-toggle');
  var hljsLight = document.getElementById('hljs-light-theme');
  var hljsDark = document.getElementById('hljs-dark-theme');

  themeBtn.addEventListener('click', function() {
    currentTheme = currentTheme === 'light' ? 'dark' : 'light';
    document.body.setAttribute('data-theme', currentTheme);
    themeBtn.textContent = currentTheme === 'light' ? 'Dark' : 'Light';
    hljsLight.disabled = currentTheme === 'dark';
    hljsDark.disabled = currentTheme !== 'dark';
    if (mermaidReady) updateMermaidTheme();
  });

  // TOC toggle
  var tocSidebar = document.getElementById('toc-sidebar');
  var tocToggle = document.getElementById('toc-toggle');
  var mainContent = document.getElementById('main-content');

  tocToggle.addEventListener('click', function() {
    tocSidebar.classList.toggle('open');
    mainContent.classList.toggle('with-toc');
  });

  // Mode toggle
  var modeButtons = document.querySelectorAll('.mode-btn');
  modeButtons.forEach(function(btn) {
    btn.addEventListener('click', function() {
      setMode(btn.dataset.mode);
    });
  });

  function setMode(mode) {
    currentMode = mode;
    modeButtons.forEach(function(b) {
      b.classList.toggle('active-mode', b.dataset.mode === mode);
    });
    if (mode === 'split') {
      editorPane.style.display = 'flex';
      editorPane.style.width = '50%';
      previewPane.style.display = 'block';
      previewPane.style.width = '50%';
    } else if (mode === 'view') {
      editorPane.style.display = 'none';
      previewPane.style.display = 'block';
      previewPane.style.width = '100%';
    } else if (mode === 'edit') {
      editorPane.style.display = 'flex';
      editorPane.style.width = '100%';
      previewPane.style.display = 'none';
    }
  }

  // Scroll sync
  editor.addEventListener('scroll', function() {
    if (syncScrollLock) return;
    syncScrollLock = 'editor';
    var ratio = editor.scrollTop / (editor.scrollHeight - editor.clientHeight || 1);
    previewPane.scrollTop = ratio * (previewPane.scrollHeight - previewPane.clientHeight || 1);
    setTimeout(function() { syncScrollLock = null; }, 50);
  });

  previewPane.addEventListener('scroll', function() {
    if (syncScrollLock) return;
    syncScrollLock = 'preview';
    var ratio = previewPane.scrollTop / (previewPane.scrollHeight - previewPane.clientHeight || 1);
    editor.scrollTop = ratio * (editor.scrollHeight - editor.clientHeight || 1);
    setTimeout(function() { syncScrollLock = null; }, 50);
  });

  // File operations — save via local server (syncs both md AND html)
  var saveBtn = document.getElementById('save-btn');
  var downloadBtn = document.getElementById('download-btn');

  saveBtn.addEventListener('click', saveToFile);
  downloadBtn.addEventListener('click', downloadFile);

  function saveToFile() {
    if (serverConnected) {
      fetch('http://localhost:' + savePort + '/save?file=' + encodeURIComponent(sourceRelPath), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ content: editor.value })
      })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data.ok) {
          if (data.htmlUpdated) {
            saveBtn.textContent = 'Synced!';
          } else {
            saveBtn.textContent = 'Saved!';
          }
          setTimeout(function() { saveBtn.textContent = 'Save'; }, 2000);
        } else {
          alert('Save failed: ' + (data.error || 'unknown error'));
        }
      })
      .catch(function(e) {
        alert('Save failed: server unreachable. Use Download instead.');
      });
    } else {
      downloadFile();
    }
  }

  function downloadFile() {
    var blob = new Blob([editor.value], { type: 'text/markdown' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = sourceFileName;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Render functions
  var renderTimeout;
  function triggerRender() {
    clearTimeout(renderTimeout);
    renderTimeout = setTimeout(renderPreview, 200);
  }

  function renderPreview() {
    if (!mdi) return;
    rawMarkdown = editor.value;
    previewBody.innerHTML = mdi.render(rawMarkdown);
    addCopyButtons();
    processMermaid();
    buildTOC();
  }

  function addCopyButtons() {
    var preBlocks = previewBody.querySelectorAll('pre');
    preBlocks.forEach(function(pre) {
      var code = pre.querySelector('code');
      if (code && (code.classList.contains('language-mermaid') || code.classList.contains('language-Mermaid'))) return;
      var btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'Copy';
      btn.addEventListener('click', function() {
        var text = code ? code.textContent : pre.textContent;
        navigator.clipboard.writeText(text).then(function() {
          btn.textContent = 'Copied!';
          setTimeout(function() { btn.textContent = 'Copy'; }, 2000);
        });
      });
      pre.style.position = 'relative';
      pre.appendChild(btn);
    });
  }

  function processMermaid() {
    if (!mermaidReady) return;
    var blocks = previewBody.querySelectorAll('pre code.language-mermaid, pre code.language-Mermaid');
    blocks.forEach(function(block) {
      var source = block.textContent;
      var wrapper = document.createElement('div');
      wrapper.className = 'mermaid-wrapper';
      var hint = document.createElement('span');
      hint.className = 'zoom-hint';
      hint.textContent = 'Click to zoom';
      var mermaidDiv = document.createElement('div');
      mermaidDiv.className = 'mermaid';
      mermaidDiv.textContent = source.trim();
      var pre = block.parentElement;
      pre.parentElement.insertBefore(wrapper, pre);
      pre.remove();
      wrapper.appendChild(hint);
      wrapper.appendChild(mermaidDiv);
      wrapper.addEventListener('click', function(e) {
        if (e.target === hint) return;
        setTimeout(function() {
          var svg = mermaidDiv.querySelector('svg');
          if (svg) showOverlay(svg.outerHTML);
        }, 500);
      });
    });
    setTimeout(function() { mermaid.run({ querySelector: '.mermaid' }); }, 100);
  }

  function buildTOC() {
    var headings = previewBody.querySelectorAll('h1, h2, h3, h4');
    var html = '';
    headings.forEach(function(h) {
      var level = h.tagName.toLowerCase();
      var text = h.textContent;
      if (!h.id) h.id = 'heading-' + Math.random().toString(36).substr(2, 6);
      html += '<a class="toc-link toc-' + level + '" href="#' + h.id + '">' + text + '</a>';
    });
    tocSidebar.innerHTML = html;
  }

  function updateMermaidTheme() {
    mermaidTheme = currentTheme === 'dark' ? 'dark' : 'default';
    mermaid.initialize({ theme: mermaidTheme });
    renderPreview();
  }

  // SVG Zoom overlay
  var overlay = document.getElementById('svg-overlay');
  var svgContainer = document.getElementById('svg-container');
  var zoomLevelEl = document.getElementById('zoom-level');
  var currentZoom = 1;
  var panX = 0, panY = 0;
  var isDragging = false;
  var dragStartX, dragStartY, panStartX, panStartY;

  function showOverlay(svgSource) {
    svgContainer.innerHTML = svgSource;
    currentZoom = 1; panX = 0; panY = 0;
    updateTransform();
    overlay.classList.add('active');
    var svg = svgContainer.querySelector('svg');
    if (svg) {
      if (!svg.getAttribute('viewBox')) {
        var w = parseFloat(svg.getAttribute('width')) || svg.clientWidth || 800;
        var h = parseFloat(svg.getAttribute('height')) || svg.clientHeight || 600;
        svg.setAttribute('viewBox', '0 0 ' + w + ' ' + h);
      }
      svg.style.width = '100%';
      svg.style.height = '100%';
      svg.style.maxWidth = '90vw';
      svg.style.maxHeight = '90vh';
    }
  }

  function hideOverlay() { overlay.classList.remove('active'); }

  function updateTransform() {
    svgContainer.style.transform = 'scale(' + currentZoom + ') translate(' + panX + 'px, ' + panY + 'px)';
    zoomLevelEl.textContent = Math.round(currentZoom * 100) + '%';
  }

  document.getElementById('overlay-close').addEventListener('click', hideOverlay);
  overlay.addEventListener('click', function(e) { if (e.target === overlay) hideOverlay(); });
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && overlay.classList.contains('active')) hideOverlay();
  });

  document.getElementById('zoom-in').addEventListener('click', function() {
    currentZoom = Math.min(currentZoom * 1.25, 10);
    updateTransform();
  });
  document.getElementById('zoom-out').addEventListener('click', function() {
    currentZoom = Math.max(currentZoom / 1.25, 0.1);
    updateTransform();
  });
  document.getElementById('zoom-reset').addEventListener('click', function() {
    currentZoom = 1; panX = 0; panY = 0;
    updateTransform();
  });

  overlay.addEventListener('wheel', function(e) {
    if (!overlay.classList.contains('active')) return;
    e.preventDefault();
    var delta = e.deltaY > 0 ? 0.85 : 1.18;
    currentZoom = Math.max(0.1, Math.min(10, currentZoom * delta));
    updateTransform();
  });

  svgContainer.addEventListener('mousedown', function(e) {
    if (overlay.classList.contains('active')) {
      isDragging = true;
      dragStartX = e.clientX; dragStartY = e.clientY;
      panStartX = panX; panStartY = panY;
      overlay.style.cursor = 'grabbing';
    }
  });
  document.addEventListener('mousemove', function(e) {
    if (!isDragging) return;
    panX = panStartX + (e.clientX - dragStartX) / currentZoom;
    panY = panStartY + (e.clientY - dragStartY) / currentZoom;
    updateTransform();
  });
  document.addEventListener('mouseup', function() {
    isDragging = false;
    overlay.style.cursor = 'grab';
  });

  // Init: wait for CDN scripts then set up editor listener and render
  function waitForScripts() {
    if (typeof markdownit !== 'undefined' && typeof hljs !== 'undefined') {
      mdi = window.markdownit({
        html: true, linkify: true, typographer: true,
        highlight: function(str, lang) {
          if (lang && window.hljs.getLanguage(lang)) {
            try { return window.hljs.highlight(str, {language: lang}).value; } catch(e) {}
          }
          try { return window.hljs.highlightAuto(str).value; } catch(e) {}
          return '';
        }
      });

      if (typeof mermaid !== 'undefined') {
        mermaid.initialize({
          startOnLoad: false,
          theme: mermaidTheme,
          securityLevel: 'loose',
          fontFamily: '-apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif'
        });
        mermaidReady = true;
      }

      editor.addEventListener('input', triggerRender);
      renderPreview();
      setMode('split');
    } else {
      setTimeout(waitForScripts, 100);
    }
  }

  waitForScripts();
})();

</script>
</body>
